<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflect Rumble Results</title>
  <link rel="stylesheet" href="reflect-rumble-results.css">
</head>
<body>
  <main class="results-shell">
    <section class="results-hero">
      <p class="eyebrow">Reflect Rumble Results</p>
      <h1>Final Standings</h1>
      <p id="resultsRoomLabel" class="hero-copy">Loading room results...</p>
    </section>
    <section class="results-panel">
      <div id="resultsList" class="results-list"></div>
    </section>
    <div class="results-actions">
        <a id="leaveResultsRoomLink" class="results-link" href="lobby.html">Leave Room</a>
        <a id="returnToLobbyLink" class="results-link secondary" href="lobby.html">Back To Lobby</a>
    </div>
  </main>
  <script src="reflect-rumble-results.js"></script>
</body>
</html>
